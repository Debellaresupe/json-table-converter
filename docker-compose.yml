services:
  backend:
    build:
      context: ./backend
    container_name: jsontableconverter-backend
    ports:
      - "8001:8000"
    environment:
      MAX_JSON_BYTES: "10485760"
      CORS_ORIGINS: '["http://soulmiker.fvds.ru:3000","http://soulmiker.fvds.ru"]'
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: jsontableconverter-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
